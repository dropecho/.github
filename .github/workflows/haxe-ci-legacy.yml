name: HAXE_CI_LEGACY

# Legacy CI that installs Haxe with krdlab/setup-haxe and pulls libraries
# straight from haxelib via the .hxml files (test.hxml / build.hxml).
# Does NOT use lix.

on:
  workflow_call:
    inputs:
      haxe-versions:
        description: "JSON array of Haxe versions to test against"
        required: false
        type: string
        default: '["4.3.0"]'
      os:
        description: "JSON array of operating systems to run the matrix on"
        required: false
        type: string
        default: '["ubuntu-latest"]'
    secrets:
      HAXELIB_PASS:
        required: true

jobs:
  unit_tests:
    strategy:
      matrix:
        os: ${{ fromJSON(inputs.os) }}
        haxe: ${{ fromJSON(inputs.haxe-versions) }}
      fail-fast: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: "npm"
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ matrix.haxe }}
      - name: Install Haxe libraries
        run: haxelib install test.hxml --always
      - name: Run Tests
        run: |
          npm ci
          mkdir -p artifacts
          npm run test
  semantic_release:
    needs: unit_tests
    name: semantic_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: "npm"
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.0
      - name: Install Haxe libraries
        run: haxelib install build.hxml --always
      - name: Run semantic release
        env: # Or as an environment variable
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAXELIB_PASS: ${{ secrets.HAXELIB_PASS }}
        run: |
          npm ci
          npm run build
          npx semantic-release
