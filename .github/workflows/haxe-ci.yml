name: HAXE_CI

on:
  workflow_call:
    inputs:
      haxe-versions:
        description: "JSON array of Haxe versions to test against (lix installs these)"
        required: false
        type: string
        default: '["4.3.0"]'
      os:
        description: "JSON array of operating systems to run the matrix on"
        required: false
        type: string
        default: '["ubuntu-latest"]'
    secrets:
      HAXELIB_PASS:
        required: true

jobs:
  unit_tests:
    strategy:
      matrix:
        os: ${{ fromJSON(inputs.os) }}
        haxe: ${{ fromJSON(inputs.haxe-versions) }}
      fail-fast: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      # lix downloads Haxe itself, so no separate Haxe setup action is needed.
      - name: Install lix
        run: npm install --no-save lix
      - name: Set up Haxe via lix
        run: |
          npx lix install haxe ${{ matrix.haxe }}
          npx lix use haxe ${{ matrix.haxe }}
          npx lix download
      - name: Run Tests
        run: |
          mkdir -p artifacts
          npm run test
  semantic_release:
    needs: unit_tests
    name: semantic_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      packages: write
      # Required for npm OIDC trusted publishing (short-lived token exchange).
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET SDK  
        uses: actions/setup-dotnet@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      # npm OIDC trusted publishing needs npm CLI >= 11.5.1; Node 22 ships npm 10.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Install lix
        run: npm install --no-save lix
      - name: Set up Haxe via lix
        run: npx lix download
      - name: Run semantic release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAXELIB_PASS: ${{ secrets.HAXELIB_PASS }}
          # No NPM_TOKEN: npm publishing uses OIDC trusted publishing.
        run: |
          npm run build
          npx semantic-release
