name: HAXE_CI

on:
  workflow_call:
    secrets:
      HAXELIB_PASS:
        required: true
# TODO add rest of os to matrix
# os: [ubuntu-latest, macos-latest]

jobs:
  unit_tests:
    strategy:
      matrix:
        os: [ubuntu-latest]
        haxe: [4.3.0]
      fail-fast: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16
          cache: "npm"
      - name: Setup haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ matrix.haxe }}
      - name: Install Haxe Deps for tests.
        run: |
          npm install -g lix
          haxe -version
          haxelib install test.hxml --always
      - name: Run Tests
        run: |
          mkdir artifacts
          npm run test
  semantic_release:
    needs: unit_tests
    name: semantic_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16
          cache: "npm"
      - name: Setup haxe
        uses: krdlab/setup-haxe@v1
      - name: Run semantic release
        env: # Or as an environment variable
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAXELIB_PASS: ${{secrets.HAXELIB_PASS}}
        run: |
          npm ci
          haxelib install build.hxml --always
          npm run build
          npx semantic-release
